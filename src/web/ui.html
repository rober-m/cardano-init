<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cardano-init</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222633;
    --border: #2a2e3d;
    --border-active: #5b8af5;
    --text: #e1e4ed;
    --text-muted: #8b90a0;
    --accent: #5b8af5;
    --accent-dim: rgba(91, 138, 245, 0.15);
    --green: #4ade80;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* -- Page layout: fixed header row, then two columns -- */
  .page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    max-width: 960px;
    margin: 0 auto;
    height: 100vh;
  }

  /* -- Header: spans both columns, fixed -- */
  header {
    grid-column: 1 / -1;
    text-align: center;
    padding: 1.25rem 1.5rem 0;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--text-muted);
    margin-top: 0.25rem;
    font-size: 0.95rem;
  }

  /* -- Top bar: project name + command, spans both columns, fixed -- */
  .top-bar {
    grid-column: 1 / -1;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: flex-end;
    gap: 1rem;
  }

  .top-bar .config-field {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    flex-shrink: 0;
  }

  .top-bar .config-field label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .top-bar .config-field input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 0.5rem 0.75rem;
    font-size: 0.9rem;
    font-family: var(--font);
    outline: none;
    width: 180px;
    transition: border-color 0.15s;
  }

  .top-bar .config-field input:focus {
    border-color: var(--accent);
  }

  .command-bar {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    padding: 0.5rem 0.75rem;
    gap: 0.75rem;
  }

  .command-text {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--green);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .command-empty { color: var(--text-muted); }

  .copy-btn {
    background: var(--accent-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    font-size: 0.7rem;
    font-family: var(--font);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .copy-btn:hover { background: var(--accent); color: #fff; }
  .copy-btn.copied { background: var(--green); color: var(--bg); border-color: var(--green); }

  /* -- Left column: scrollable tool selection -- */
  .col-left {
    padding: 0 1.5rem 1.5rem;
    overflow-y: auto;
    min-height: 0;
  }

  /* -- Right column: scrollable file tree -- */
  .col-right {
    padding: 0 1.5rem 1.5rem 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  @media (max-width: 800px) {
    html, body { overflow: auto; }
    .page {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto;
      height: auto;
    }
    .col-right {
      padding: 0 1.5rem 1.5rem;
    }
  }

  /* -- Option sections (network, nix, roles) -- */
  .option-section {
    margin-bottom: 1.25rem;
  }

  .option-header {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .option-header .hint {
    font-weight: 400;
    font-size: 0.75rem;
    text-transform: none;
    letter-spacing: 0;
  }

  .option-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .option-row select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 0.5rem 0.75rem;
    font-size: 0.9rem;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }

  .option-row select:focus { border-color: var(--accent); }

  .nix-toggle label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.5rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s;
    user-select: none;
  }

  .nix-toggle input { display: none; }

  .nix-toggle input:checked + label {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  /* -- Tool cards -- */
  .tool-grid {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .tool-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .tool-card:hover { background: var(--surface-hover); }

  .tool-card.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .tool-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.35rem;
  }

  .tool-name { font-weight: 600; font-size: 0.95rem; }

  .tool-lang {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
  }

  .tool-desc {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .tool-website {
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    margin-top: 0.35rem;
    display: inline-block;
  }

  .tool-website:hover { text-decoration: underline; }

  /* -- File tree panel -- */
  .panel-tree {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  .file-tree {
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.75rem 1rem;
    line-height: 1.6;
    color: var(--text-muted);
    overflow-y: auto;
    white-space: pre;
    flex: 1;
    min-height: 0;
  }

  .file-tree .dir { color: var(--text); }
  .file-tree .file { color: var(--text-muted); }

  .file-tree-empty {
    padding: 2rem 1rem;
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
    white-space: normal;
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1><span>cardano-init</span></h1>
    <p>Select tools for your Cardano protocol project</p>
  </header>

  <!-- Fixed top bar: project name + command -->
  <div class="top-bar">
    <div class="config-field">
      <label for="project-name">Project name</label>
      <input type="text" id="project-name" value="my-protocol" placeholder="my-protocol">
    </div>
    <div class="command-bar">
      <div id="command" class="command-text command-empty">Select at least one tool</div>
      <button id="copy-btn" class="copy-btn" style="display:none">Copy</button>
    </div>
  </div>

  <!-- Left column: scrollable options + tool selection -->
  <div class="col-left">
    <div id="roles"></div>

    <div class="option-section">
      <div class="option-header">Network</div>
      <div class="option-row">
        <select id="network">
          <option value="preview" selected>preview</option>
          <option value="preprod">preprod</option>
          <option value="mainnet">mainnet</option>
        </select>
      </div>
    </div>

    <div class="option-section">
      <div class="option-header">Options</div>
      <div class="option-row">
        <div class="nix-toggle">
          <input type="checkbox" id="nix">
          <label for="nix">Generate Nix flake</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Right column: scrollable file tree -->
  <div class="col-right">
    <div class="panel-tree">
      <div class="panel-header">
        <span class="panel-title">File tree</span>
      </div>
      <div id="file-tree" class="file-tree">
        <div class="file-tree-empty">Select a tool to see the file tree</div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  let registry = { tools: [] };
  const selection = {
    'on-chain': 'aiken',
    'off-chain': 'meshjs',
    'infrastructure': [],
    'testing': null,
  };

  const ROLE_ORDER = ['on-chain', 'off-chain', 'infrastructure', 'testing'];
  const ROLE_LABELS = {
    'on-chain': 'On-chain',
    'off-chain': 'Off-chain',
    'infrastructure': 'Infrastructure',
    'testing': 'Testing',
  };
  const ROLE_HINTS = {
    'on-chain': 'Smart contract logic',
    'off-chain': 'Transaction building',
    'infrastructure': 'Indexers & services (multi-select)',
    'testing': 'Local testing',
  };

  fetch('/api/registry')
    .then(r => r.json())
    .then(data => {
      registry = data;
      renderRoles();
      updateCommand();
      updatePlan();
    });

  function renderRoles() {
    const container = document.getElementById('roles');
    container.innerHTML = '';

    for (const role of ROLE_ORDER) {
      const tools = registry.tools.filter(t => t.roles.includes(role));
      if (tools.length === 0) continue;

      const section = document.createElement('div');
      section.className = 'option-section';

      section.innerHTML = `
        <div class="option-header">
          ${ROLE_LABELS[role]}
          <span class="hint">${ROLE_HINTS[role]}</span>
        </div>
        <div class="tool-grid" data-role="${role}">
          ${tools.map(t => `
            <div class="tool-card${isSelected(role, t.id) ? ' selected' : ''}" data-tool="${t.id}" data-role="${role}">
              <div class="tool-card-header">
                <span class="tool-name">${t.name}</span>
                <span class="tool-lang">${t.languages.join(', ')}</span>
              </div>
              <div class="tool-desc">${firstSentence(t.description)}</div>
              <a class="tool-website" href="${t.website}" target="_blank">${t.website}</a>
            </div>
          `).join('')}
        </div>
      `;

      container.appendChild(section);
    }

    document.querySelectorAll('.tool-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.tool-website')) return;
        handleCardClick(card);
      });
    });
  }

  function handleCardClick(card) {
    const role = card.dataset.role;
    const toolId = card.dataset.tool;

    if (role === 'infrastructure') {
      const idx = selection[role].indexOf(toolId);
      if (idx >= 0) {
        selection[role].splice(idx, 1);
        card.classList.remove('selected');
      } else {
        selection[role].push(toolId);
        card.classList.add('selected');
      }
    } else {
      const grid = card.closest('.tool-grid');
      if (selection[role] === toolId) {
        selection[role] = null;
        card.classList.remove('selected');
      } else {
        selection[role] = toolId;
        grid.querySelectorAll('.tool-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
      }
    }

    updateCommand();
    updatePlan();
  }

  function isSelected(role, toolId) {
    if (role === 'infrastructure') return selection[role].includes(toolId);
    return selection[role] === toolId;
  }

  function hasSelection() {
    return selection['on-chain'] || selection['off-chain'] ||
      selection['infrastructure'].length > 0 || selection['testing'];
  }

  function updateCommand() {
    const el = document.getElementById('command');
    const btn = document.getElementById('copy-btn');
    const name = document.getElementById('project-name').value.trim() || 'my-protocol';
    const network = document.getElementById('network').value;
    const nix = document.getElementById('nix').checked;

    if (!hasSelection()) {
      el.textContent = 'Select at least one tool';
      el.classList.add('command-empty');
      btn.style.display = 'none';
      return;
    }

    const parts = ['cardano-init', '--name', name];

    if (selection['on-chain']) parts.push('--on-chain', selection['on-chain']);
    if (selection['off-chain']) parts.push('--off-chain', selection['off-chain']);
    for (const infra of selection['infrastructure']) parts.push('--infra', infra);
    if (selection['testing']) parts.push('--testing', selection['testing']);
    if (network !== 'preview') parts.push('--network', network);
    if (nix) parts.push('--nix');

    el.textContent = parts.join(' ');
    el.classList.remove('command-empty');
    btn.style.display = '';
  }

  let planAbort = null;

  function updatePlan() {
    if (planAbort) planAbort.abort();

    const treeEl = document.getElementById('file-tree');

    if (!hasSelection()) {
      treeEl.innerHTML = '<div class="file-tree-empty">Select a tool to see the file tree</div>';
      return;
    }

    const params = new URLSearchParams();
    const name = document.getElementById('project-name').value.trim() || 'my-protocol';
    params.set('name', name);

    if (selection['on-chain']) params.set('on_chain', selection['on-chain']);
    if (selection['off-chain']) params.set('off_chain', selection['off-chain']);
    if (selection['infrastructure'].length > 0) {
      params.set('infra', selection['infrastructure'].join(','));
    }
    if (selection['testing']) params.set('testing', selection['testing']);
    params.set('nix', document.getElementById('nix').checked ? 'true' : 'false');
    params.set('network', document.getElementById('network').value);

    planAbort = new AbortController();

    fetch('/api/plan?' + params.toString(), { signal: planAbort.signal })
      .then(r => r.json())
      .then(data => {
        renderFileTree(data.files, name);
      })
      .catch(() => {});
  }

  function renderFileTree(files, projectName) {
    const treeEl = document.getElementById('file-tree');

    if (!files || files.length === 0) {
      treeEl.innerHTML = '<div class="file-tree-empty">No files</div>';
      return;
    }

    const root = {};
    for (const f of files) {
      const parts = f.split('/');
      let node = root;
      for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        if (i === parts.length - 1) {
          node[p] = null;
        } else {
          if (!node[p] || typeof node[p] !== 'object') node[p] = {};
          node = node[p];
        }
      }
    }

    let html = '<span class="dir">' + esc(projectName) + '/</span>\n';
    html += renderTreeNode(root, '');
    treeEl.innerHTML = html;
  }

  function renderTreeNode(node, prefix) {
    const keys = Object.keys(node);
    let out = '';

    keys.forEach((key, idx) => {
      const isLast = idx === keys.length - 1;
      const connector = isLast ? '\u2514\u2500\u2500 ' : '\u251C\u2500\u2500 ';
      const childPrefix = prefix + (isLast ? '    ' : '\u2502   ');

      if (node[key] !== null && typeof node[key] === 'object') {
        out += prefix + connector + '<span class="dir">' + esc(key) + '/</span>\n';
        out += renderTreeNode(node[key], childPrefix);
      } else {
        out += prefix + connector + '<span class="file">' + esc(key) + '</span>\n';
      }
    });

    return out;
  }

  function firstSentence(desc) {
    const m = desc.match(/^.*?\./);
    return m ? m[0] : desc.slice(0, 80);
  }

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  document.getElementById('project-name').addEventListener('input', () => {
    updateCommand();
    updatePlan();
  });
  document.getElementById('network').addEventListener('change', () => {
    updateCommand();
    updatePlan();
  });
  document.getElementById('nix').addEventListener('change', () => {
    updateCommand();
    updatePlan();
  });

  document.getElementById('copy-btn').addEventListener('click', () => {
    const text = document.getElementById('command').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1500);
    });
  });
})();
</script>
</body>
</html>
